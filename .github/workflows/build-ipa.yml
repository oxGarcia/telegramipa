name: Build Telegram IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      # ── Setup ────────────────────────────────────────────────────────────────

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Source ───────────────────────────────────────────────────────────────

      - name: Clone Telegram-iOS
        run: |
          set -euxo pipefail
          git clone --recursive -j8 \
            https://github.com/TelegramMessenger/Telegram-iOS.git telegram-src

      # ── Patches ──────────────────────────────────────────────────────────────

      - name: Patch Make.py for CI
        run: python3 .github/scripts/patch_make.py

      - name: Patch ProjectGeneration.py for CI
        run: python3 .github/scripts/patch_project_generation.py

      - name: Apply LARP patch
        run: |
          set -euxo pipefail
          cd telegram-src
          python3 -c "
          from pathlib import Path
          src = Path('../larp.patch')
          dst = Path('../larp.patch.lf')
          dst.write_bytes(src.read_bytes().replace(b'\r\n', b'\n'))
          "
          if git apply --3way --allow-empty ../larp.patch.lf; then
            echo "LARP patch applied."
          else
            echo "WARNING: LARP patch did not apply cleanly (continuing)." >&2
          fi

      # ── Config ───────────────────────────────────────────────────────────────

      - name: Create build config
        run: |
          set -euxo pipefail
          cd telegram-src
          BUNDLE_ID="${{ secrets.BUNDLE_ID }}"
          [ -z "$BUNDLE_ID" ] && BUNDLE_ID="org.telegram.build"
          TEAM_ID="${{ secrets.TEAM_ID }}"
          [ -z "$TEAM_ID" ] && TEAM_ID="C67CF9S4VU"
          API_ID="${{ secrets.API_ID }}"
          [ -z "$API_ID" ] && API_ID="0"
          API_HASH="${{ secrets.API_HASH }}"
          [ -z "$API_HASH" ] && API_HASH="placeholder"

          cat > build-config.json << CONFIG
          {
            "bundle_id": "${BUNDLE_ID}",
            "api_id": "${API_ID}",
            "api_hash": "${API_HASH}",
            "team_id": "${TEAM_ID}",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tg",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          CONFIG

      # ── Codesigning setup ────────────────────────────────────────────────────

      - name: Create fake provisioning profile
        run: |
          set -euxo pipefail
          cd telegram-src
          mkdir -p build-system/fake-codesigning/profiles
          python3 ../.github/scripts/create_profile.py

      - name: Import fake certificates into keychain
        run: |
          set -euxo pipefail
          cd telegram-src
          python3 build-system/Make/ImportCertificates.py \
            --path build-system/fake-codesigning/certs

      # ── Pre-download Bazel dependencies (avoid GitHub 502) ───────────────────

      - name: Pre-download Bazel dependencies
        run: |
          set -euxo pipefail
          DISTDIR="$HOME/bazel-distdir"
          mkdir -p "$DISTDIR"

          dl() {
            local out="$1"; shift
            [ -f "$out" ] && return 0
            for url in "$@"; do
              curl -fL --retry 10 --retry-all-errors --retry-delay 3 -o "$out" "$url" && return 0
            done
            echo "WARN: failed to pre-download $(basename "$out")" >&2
            return 0
          }

          dl "$DISTDIR/cmake-4.1.2-macos-universal.tar.gz" \
            "https://cmake.org/files/v4.1/cmake-4.1.2-macos-universal.tar.gz" \
            "https://github.com/Kitware/CMake/releases/download/v4.1.2/cmake-4.1.2-macos-universal.tar.gz"

          dl "$DISTDIR/rules_python-1.6.0.tar.gz" \
            "https://github.com/bazel-contrib/rules_python/releases/download/1.6.0/rules_python-1.6.0.tar.gz" \
            "https://codeload.github.com/bazel-contrib/rules_python/tar.gz/refs/tags/1.6.0"

          dl "$DISTDIR/index-import.tar.gz" \
            "https://github.com/MobileNativeFoundation/index-import/releases/download/5.8.0.1/index-import.tar.gz" \
            "https://codeload.github.com/MobileNativeFoundation/index-import/tar.gz/refs/tags/5.8.0.1"

          ls -lah "$DISTDIR"

      # ── Build ────────────────────────────────────────────────────────────────

      - name: Build Telegram (release arm64)
        run: |
          set -euxo pipefail
          cd telegram-src
          python3 build-system/Make/Make.py \
            --overrideXcodeVersion \
            --cacheDir="$HOME/telegram-bazel-cache" \
            --bazelArguments="--distdir=$HOME/bazel-distdir" \
            build \
            --configurationPath=build-config.json \
            --codesigningInformationPath=build-system/fake-codesigning \
            --buildNumber=100001 \
            --configuration=release_arm64

      # ── Post-build: re-sign for TrollStore ───────────────────────────────────

      - name: Re-sign IPA for TrollStore (strip app groups)
        run: |
          set -euxo pipefail
          cd telegram-src

          IPA=""
          [ -f "bazel-bin/Telegram/Telegram.ipa" ] && IPA="bazel-bin/Telegram/Telegram.ipa"
          if [ -z "$IPA" ]; then
            for f in bazel-out/*/bin/Telegram/Telegram.ipa; do
              [ -f "$f" ] && IPA="$f" && break
            done
          fi
          [ -z "$IPA" ] && { echo "ERROR: IPA not found" >&2; ls -la bazel-bin/Telegram || true; exit 1; }

          TEAM_ID=$(python3 -c "import json; print(json.load(open('build-config.json'))['team_id'])")
          BUNDLE_ID=$(python3 -c "import json; print(json.load(open('build-config.json'))['bundle_id'])")

          mkdir -p build/artifacts
          python3 ../.github/scripts/resign_trollstore.py \
            "$IPA" \
            build/artifacts/Telegram.ipa \
            "$TEAM_ID" \
            "$BUNDLE_ID"

      # ── Collect dSYMs ────────────────────────────────────────────────────────

      - name: Collect dSYMs
        run: |
          set -euxo pipefail
          cd telegram-src
          for f in bazel-bin/Telegram/*.dSYM; do
            [ -d "$f" ] || continue
            mkdir -p build/DSYMs
            cp -R "$f" build/DSYMs/
          done
          if [ -d build/DSYMs ]; then
            zip -r build/artifacts/Telegram.DSYMs.zip build/DSYMs >/dev/null
            echo "DSYMs collected."
          fi

      # ── Upload ───────────────────────────────────────────────────────────────

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-TrollStore
          path: |
            telegram-src/build/artifacts/Telegram.ipa
            telegram-src/build/artifacts/Telegram.DSYMs.zip
          if-no-files-found: warn

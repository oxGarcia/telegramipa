      - name: Create build config
        run: |
          set -euxo pipefail
          cd telegram-src
          
          # Criar diretório de provisioning
          mkdir -p build-system/fake-codesigning/profiles
          
          # Criar um conteúdo básico de provisioning que inclua o aps-environment
          cat > build-system/fake-codesigning/profiles/template.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Entitlements</key>
              <dict>
                  <key>aps-environment</key>
                  <string>development</string>
                  <key>com.apple.developer.team-identifier</key>
                  <string>C67CF9S4VU</string>
              </dict>
          </dict>
          </plist>
          PLIST

          # Aplicar o template para todos os arquivos exigidos
          cp build-system/fake-codesigning/profiles/template.plist build-system/fake-codesigning/profiles/Share.mobileprovision
          cp build-system/fake-codesigning/profiles/template.plist build-system/fake-codesigning/profiles/NotificationService.mobileprovision
          cp build-system/fake-codesigning/profiles/template.plist build-system/fake-codesigning/profiles/Intents.mobileprovision
          cp build-system/fake-codesigning/profiles/template.plist build-system/fake-codesigning/profiles/Widget.mobileprovision
          # Também criar o perfil principal do App
          cp build-system/fake-codesigning/profiles/template.plist build-system/fake-codesigning/profiles/App.mobileprovision
          
          BUNDLE_ID="${{ secrets.BUNDLE_ID }}"
          [ -z "$BUNDLE_ID" ] && BUNDLE_ID="org.telegram.build"
          TEAM_ID="${{ secrets.TEAM_ID }}"
          [ -z "$TEAM_ID" ] && TEAM_ID="C67CF9S4VU"
          API_ID="${{ secrets.API_ID }}"
          [ -z "$API_ID" ] && API_ID="0"
          API_HASH="${{ secrets.API_HASH }}"
          [ -z "$API_HASH" ] && API_HASH="placeholder"
          
          cat > build-config.json << CONFIG
          {
            "bundle_id": "${BUNDLE_ID}",
            "api_id": "${API_ID}",
            "api_hash": "${API_HASH}",
            "team_id": "${TEAM_ID}",
            "appstore_id": "0",
            "app_center_id": "0",
            "premium_iap_product_id": "org.telegram.Telegram.premium",
            "is_internal_build": false,
            "is_appstore_build": false,
            "enable_siri": false,
            "enable_icloud": false,
            "app_specific_url_scheme": "tg"
          }
          CONFIG
